{% extends "base.html" %}

{% block title %}
Register
{% endblock %}

{% block content %}

<div class="card">

    <h1>Register</h1>

    <form method="POST">

        <input
            name="username"
            placeholder="Username"
            required
        >

        <input
            name="password"
            type="password"
            placeholder="Password"
            required
        >

        <button type="submit">
            Register
        </button>

    </form>

</div>

{% endblock %}
